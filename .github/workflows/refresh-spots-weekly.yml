name: Weekly Spot Refresh (Market Data)

on:
    schedule:
        # Every Sunday at 22:00 UTC (before Monday pre-market)
        - cron: "0 22 * * 0"
    workflow_dispatch: # Allow manual trigger

jobs:
    refresh:
        runs-on: ubuntu-latest
        steps:
            - name: Refresh market data for all spots
              env:
                  APP_URL: ${{ secrets.APP_URL }}
                  CRON_SECRET: ${{ secrets.CRON_SECRET }}
              run: |
                  curl -sf -X POST \
                    "${APP_URL}/api/spots/refresh-all?tier=weekly" \
                    -H "Authorization: Bearer ${CRON_SECRET}" \
                    -H "Content-Type: application/json" \
                    --max-time 120 | jq .
