<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Wheel Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="text-gray-400 hover:text-gray-600">&larr; Trades</a>
                <h1 class="text-2xl font-bold tracking-tight">Dashboard</h1>
            </div>
            <div class="flex items-center gap-4">
                <a href="/recap" class="text-sm text-gray-500 hover:text-gray-700">Recap</a>
                <div id="market-status"></div>
                <div id="vix-banner" class="text-sm"></div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 space-y-6">

        <!-- Performance Cards -->
        <section>
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">Performance</h3>
            <div id="perf-cards" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <p class="text-gray-400 text-sm col-span-full">Loading…</p>
            </div>
        </section>

        <!-- Outcome Distribution -->
        <section id="outcome-section" class="hidden">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">Outcome Distribution</h3>
            <div id="outcome-dist" class="bg-white border rounded-lg p-4"></div>
        </section>

        <!-- Strategy Split -->
        <section>
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">By Strategy</h3>
            <div id="strat-cards" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-400 text-sm col-span-full">Loading…</p>
            </div>
        </section>

        <!-- P/L Over Time -->
        <section>
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">P/L Over Time</h3>
                <div class="flex gap-2">
                    <div id="period-toggle" class="flex bg-gray-100 rounded text-xs">
                        <button data-period="month"
                            class="px-2 py-1 rounded font-medium bg-white shadow text-gray-900">Month</button>
                        <button data-period="quarter"
                            class="px-2 py-1 rounded font-medium text-gray-500 hover:text-gray-700">Quarter</button>
                        <button data-period="year"
                            class="px-2 py-1 rounded font-medium text-gray-500 hover:text-gray-700">Year</button>
                    </div>
                    <div id="view-toggle" class="flex bg-gray-100 rounded text-xs">
                        <button data-view="table"
                            class="px-2 py-1 rounded font-medium bg-white shadow text-gray-900">Table</button>
                        <button data-view="chart"
                            class="px-2 py-1 rounded font-medium text-gray-500 hover:text-gray-700">Chart</button>
                    </div>
                </div>
            </div>
            <div id="pl-time" class="bg-white border rounded-lg overflow-hidden">
                <p class="text-gray-400 text-sm p-4">Loading…</p>
            </div>
        </section>

        <!-- P/L by Symbol -->
        <section>
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">P/L by Symbol</h3>
            <div id="symbol-table" class="bg-white border rounded-lg overflow-hidden">
                <p class="text-gray-400 text-sm p-4">Loading…</p>
            </div>
        </section>

    </main>

    <script src="/static/js/helpers.js"></script>
    <script src="/static/js/vix.js"></script>
    <script src="/static/js/market_status.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>

</html>
