<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Recap — Wheel Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="text-gray-400 hover:text-gray-600">&larr; Trades</a>
                <h1 class="text-2xl font-bold tracking-tight">Daily Recap</h1>
                <span id="recap-datetime" class="text-sm text-gray-400"></span>
            </div>
            <div class="flex items-center gap-4">
                <a href="/dashboard" class="text-sm text-gray-600 hover:text-gray-700">Dashboard</a>
                <div id="market-status"></div>
                <div id="vix-banner" class="text-sm"></div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6 space-y-6">

        <a href="https://sruth.app" target="_blank" rel="noopener noreferrer"
            class="inline-flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-medium text-sm">
            View today's market recap on sruth.app
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
        </a>

        <!-- Summary Cards -->
        <section>
            <div id="summary-cards" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <p class="text-gray-400 text-sm col-span-full">Loading…</p>
            </div>
        </section>

        <!-- Action Items -->
        <section id="action-section">
            <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-3">Action Items</h3>
            <div id="action-list" class="space-y-2">
                <p class="text-gray-400 text-sm">Scanning positions…</p>
            </div>
        </section>

        <!-- Expiring This Week -->
        <section id="expiring-section" class="hidden">
            <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-3">Expiring This Week</h3>
            <div id="expiring-list" class="space-y-2"></div>
        </section>

        <!-- Recently Closed -->
        <section id="recent-section" class="hidden">
            <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-3">Recently Closed</h3>
            <div id="recent-list" class="bg-white border rounded-lg overflow-hidden"></div>
        </section>

    </main>

    <script src="/static/js/helpers.js"></script>
    <script src="/static/js/vix.js"></script>
    <script src="/static/js/market_status.js"></script>
    <script src="/static/js/recap.js"></script>
</body>

</html>
