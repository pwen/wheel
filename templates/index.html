<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheel Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold tracking-tight">Wheel Strategy Tracker</h1>
                <a href="/dashboard" class="text-sm text-gray-500 hover:text-indigo-600">Dashboard</a>
            </div>
            <div id="vix-banner" class="text-sm"></div>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-[95vw] mx-auto px-4 py-6">
        <!-- Tabs -->
        <div class="flex border-b border-gray-200 mb-4">
            <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-indigo-600 text-indigo-600"
                data-tab="trades">Trades</button>
            <button
                class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700"
                data-tab="holdings">Lots</button>
        </div>

        <!-- Trades tab -->
        <div id="tab-trades">
            {% include "partials/filters.html" %}
            {% include "partials/trade_table.html" %}
        </div>

        <!-- Holdings tab -->
        <div id="tab-holdings" class="hidden">
            {% include "partials/lots_table.html" %}
        </div>
    </main>

    {% include "partials/trade_modal.html" %}
    {% include "partials/close_modal.html" %}
    {% include "partials/lot_modal.html" %}

    <script src="/static/js/helpers.js"></script>
    <script src="/static/js/filters.js"></script>
    <script src="/static/js/sorting.js"></script>
    <script src="/static/js/trades.js"></script>
    <script src="/static/js/close.js"></script>
    <script src="/static/js/lots.js"></script>
    <script src="/static/js/prices.js"></script>
    <script src="/static/js/vix.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
