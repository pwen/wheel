<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheel Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight">Wheel Strategy Tracker</h1>
            <button onclick="openModal()"
                class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg">
                + New Trade
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-7xl mx-auto px-4 py-6">

        <!-- Trade Table -->
        <div class="bg-white shadow rounded-lg overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 text-sm">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-3 py-2 text-left font-semibold">Spot</th>
                        <th class="px-3 py-2 text-left font-semibold">Type</th>
                        <th class="px-3 py-2 text-right font-semibold">Open Price</th>
                        <th class="px-3 py-2 text-right font-semibold">Current</th>
                        <th class="px-3 py-2 text-right font-semibold">Strike</th>
                        <th class="px-3 py-2 text-left font-semibold">Expiry</th>
                        <th class="px-3 py-2 text-right font-semibold">Qty</th>
                        <th class="px-3 py-2 text-right font-semibold">Total Premium</th>
                        <th class="px-3 py-2 text-right font-semibold">$/Share</th>
                        <th class="px-3 py-2 text-right font-semibold">Break-Even</th>
                        <th class="px-3 py-2 text-left font-semibold">Opened</th>
                        <th class="px-3 py-2 text-right font-semibold">DTE</th>
                        <th class="px-3 py-2 text-left font-semibold">Closed</th>
                        <th class="px-3 py-2 text-right font-semibold">Close Cost</th>
                        <th class="px-3 py-2 text-right font-semibold">Close Spot</th>
                        <th class="px-3 py-2 text-right font-semibold">Days</th>
                        <th class="px-3 py-2 text-right font-semibold">P/L</th>
                        <th class="px-3 py-2 text-right font-semibold">P/L %</th>
                        <th class="px-3 py-2 text-left font-semibold">Status</th>
                        <th class="px-3 py-2 text-left font-semibold">Notes</th>
                    </tr>
                </thead>
                <tbody id="trades-body" class="divide-y divide-gray-100">
                    <!-- rows injected by JS -->
                </tbody>
            </table>
            <p id="empty-msg" class="text-center text-gray-400 py-8 hidden">No trades yet — click "+ New Trade" to get
                started.</p>
        </div>
    </main>

    <!-- Modal: New Trade -->
    <div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6">
            <h2 class="text-lg font-bold mb-4">New Trade</h2>
            <form id="trade-form" class="grid grid-cols-2 gap-4 text-sm">
                <div>
                    <label class="block font-medium mb-1">Symbol</label>
                    <input name="symbol" required class="w-full border rounded-lg px-3 py-2" placeholder="e.g. COPX" />
                </div>
                <div>
                    <label class="block font-medium mb-1">Type</label>
                    <select name="strategy_type" required class="w-full border rounded-lg px-3 py-2">
                        <option value="CSP">Cash-Secured Put (CSP)</option>
                        <option value="CC">Covered Call (CC)</option>
                    </select>
                </div>
                <div>
                    <label class="block font-medium mb-1">Strike</label>
                    <input name="strike" type="number" step="0.01" required
                        class="w-full border rounded-lg px-3 py-2" />
                </div>
                <div>
                    <label class="block font-medium mb-1">Expiry Date</label>
                    <input name="expiry_date" type="date" required class="w-full border rounded-lg px-3 py-2" />
                </div>
                <div>
                    <label class="block font-medium mb-1">Contracts</label>
                    <input name="contracts" type="number" min="1" required class="w-full border rounded-lg px-3 py-2"
                        value="1" />
                </div>
                <div>
                    <label class="block font-medium mb-1">Total Premium ($)</label>
                    <input name="total_premium" type="number" step="0.01" required
                        class="w-full border rounded-lg px-3 py-2" />
                </div>
                <div>
                    <label class="block font-medium mb-1">Spot Price at Open</label>
                    <input name="spot_price_at_open" type="number" step="0.01"
                        class="w-full border rounded-lg px-3 py-2" />
                </div>
                <div>
                    <label class="block font-medium mb-1">Date Opened</label>
                    <input name="opened_at" type="date" required class="w-full border rounded-lg px-3 py-2" />
                </div>
                <div class="col-span-2">
                    <label class="block font-medium mb-1">Notes</label>
                    <textarea name="notes" rows="2" class="w-full border rounded-lg px-3 py-2"></textarea>
                </div>
                <div class="col-span-2 flex justify-end gap-3 mt-2">
                    <button type="button" onclick="closeModal()"
                        class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                    <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2 rounded-lg">Save
                        Trade</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>

</html>
