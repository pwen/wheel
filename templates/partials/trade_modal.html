<!-- Modal: New Trade -->
<div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center hidden z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6">
        <h2 class="text-lg font-bold mb-4">New Trade</h2>
        <form id="trade-form" class="grid grid-cols-2 gap-4 text-sm">
            <div>
                <label class="block font-medium mb-1">Symbol</label>
                <input name="symbol" required class="w-full border rounded-lg px-3 py-2" placeholder="e.g. COPX" />
            </div>
            <div>
                <label class="block font-medium mb-1">Type</label>
                <select name="strategy_type" required class="w-full border rounded-lg px-3 py-2">
                    <option value="CSP">Cash-Secured Put (CSP)</option>
                    <option value="CC">Covered Call (CC)</option>
                </select>
            </div>
            <div>
                <label class="block font-medium mb-1">Strike</label>
                <input name="strike" type="number" step="0.01" required class="w-full border rounded-lg px-3 py-2" />
            </div>
            <div>
                <label class="block font-medium mb-1">Expiry Date</label>
                <input name="expiry_date" type="date" required class="w-full border rounded-lg px-3 py-2" />
            </div>
            <div>
                <label class="block font-medium mb-1">Contracts</label>
                <input name="contracts" type="number" min="1" required class="w-full border rounded-lg px-3 py-2"
                    value="1" />
            </div>
            <div>
                <label class="block font-medium mb-1">Total Premium ($)</label>
                <input name="total_premium" type="number" step="0.01" required
                    class="w-full border rounded-lg px-3 py-2" />
            </div>
            <div>
                <label class="block font-medium mb-1">Spot Price at Open</label>
                <input name="spot_price_at_open" type="number" step="0.01" class="w-full border rounded-lg px-3 py-2" />
            </div>
            <div>
                <label class="block font-medium mb-1">Date Opened</label>
                <input name="opened_at" type="date" required class="w-full border rounded-lg px-3 py-2" />
            </div>
            <div class="col-span-2">
                <label class="block font-medium mb-1">Notes</label>
                <textarea name="notes" rows="2" class="w-full border rounded-lg px-3 py-2"></textarea>
            </div>
            <div class="col-span-2 flex justify-end gap-3 mt-2">
                <button type="button" onclick="closeModal()"
                    class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2 rounded-lg">Save
                    Trade</button>
            </div>
        </form>
    </div>
</div>
