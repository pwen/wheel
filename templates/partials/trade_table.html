<!-- Trade Table -->
<div class="bg-white shadow rounded-lg overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200 text-sm">
        <thead class="bg-gray-100">
            <tr>
                <th class="px-3 py-2 text-left font-semibold cursor-pointer select-none group" data-sort="symbol">
                    Spot <span class="sort-arrow text-xs text-gray-400 group-hover:text-indigo-600">⇅</span>
                </th>
                <th class="px-3 py-2 text-left font-semibold">Type</th>
                <th class="px-3 py-2 text-right font-semibold">Spot Price at Open</th>
                <th class="px-3 py-2 text-right font-semibold">Spot Price</th>
                <th class="px-3 py-2 text-right font-semibold">Strike Price</th>
                <th class="px-3 py-2 text-left font-semibold">Expiry</th>
                <th class="px-3 py-2 text-right font-semibold">Qty</th>
                <th class="px-3 py-2 text-right font-semibold">Total Premium</th>
                <th class="px-3 py-2 text-right font-semibold">Premium Per Share</th>
                <th class="px-3 py-2 text-right font-semibold">Break-Even Price</th>
                <th class="px-3 py-2 text-left font-semibold cursor-pointer select-none group" data-sort="opened_at">
                    Date Opened <span class="sort-arrow text-xs text-gray-400 group-hover:text-indigo-600">⇅</span>
                </th>
                <th class="px-3 py-2 text-right font-semibold cursor-pointer select-none group" data-sort="dte">
                    DTE <span class="sort-arrow text-xs text-gray-400 group-hover:text-indigo-600">⇅</span>
                </th>
                <th class="px-3 py-2 text-left font-semibold">Date Closed</th>
                <th class="px-3 py-2 text-right font-semibold">Close Cost</th>
                <th class="px-3 py-2 text-right font-semibold">Close Spot</th>
                <th class="px-3 py-2 text-right font-semibold">Days in Trade</th>
                <th class="px-3 py-2 text-right font-semibold cursor-pointer select-none group" data-sort="realized_pl">
                    P/L <span class="sort-arrow text-xs text-gray-400 group-hover:text-indigo-600">⇅</span>
                </th>
                <th class="px-3 py-2 text-right font-semibold cursor-pointer select-none group"
                    data-sort="realized_pl_pct">
                    P/L % <span class="sort-arrow text-xs text-gray-400 group-hover:text-indigo-600">⇅</span>
                </th>
                <th class="px-3 py-2 text-left font-semibold">Status</th>
                <th class="px-3 py-2 text-left font-semibold">Notes</th>
            </tr>
        </thead>
        <tbody id="trades-body" class="divide-y divide-gray-100">
            <!-- rows injected by JS -->
        </tbody>
    </table>
    <p id="empty-msg" class="text-center text-gray-400 py-8 hidden">No trades yet — click "+ New Trade" to get
        started.</p>
</div>
