<!-- Filters -->
<div class="flex flex-wrap gap-4 mb-4 items-end">
    <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Spot</label>
        <select id="filter-spot" class="border rounded-lg px-3 py-1.5 text-sm">
            <option value="">All</option>
        </select>
    </div>
    <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Type</label>
        <select id="filter-type" class="border rounded-lg px-3 py-1.5 text-sm">
            <option value="">All</option>
            <option value="CSP">CSP</option>
            <option value="CC">CC</option>
        </select>
    </div>
    <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Status</label>
        <select id="filter-status" class="border rounded-lg px-3 py-1.5 text-sm">
            <option value="">All</option>
            <option value="open">Open</option>
            <option value="closed">Closed</option>
            <option value="assigned">Assigned</option>
            <option value="rolled">Rolled</option>
        </select>
    </div>
</div>
