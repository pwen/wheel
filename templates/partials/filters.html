<!-- Filters -->
<div class="flex flex-wrap gap-4 mb-4 items-end">
    <div>
        <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Spot</label>
        <select id="filter-spot" class="border dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 rounded-lg px-3 py-1.5 text-sm">
            <option value="">All</option>
        </select>
    </div>
    <div>
        <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Type</label>
        <select id="filter-type" class="border dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 rounded-lg px-3 py-1.5 text-sm">
            <option value="">All</option>
            <option value="CSP">CSP</option>
            <option value="CC">CC</option>
        </select>
    </div>
    <div id="filter-status-wrap" class="hidden">
        <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Status</label>
        <select id="filter-status" class="border dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 rounded-lg px-3 py-1.5 text-sm">
            <option value="">All</option>
            <option value="expired">Expired Worthless</option>
            <option value="btc">BTC</option>
            <option value="assigned">Assigned</option>
            <option value="rolled">Rolled</option>
        </select>
    </div>
    <div class="ml-auto">
        <button id="btn-new-trade" onclick="openModal()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg">
            + New Trade
        </button>
    </div>
</div>
