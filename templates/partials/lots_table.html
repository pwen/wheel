<!-- Share Lots -->
<div>
    <div class="flex justify-end mb-4">
        <button id="btn-add-shares" onclick="openLotModal()"
            class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-lg">
            + Add Shares
        </button>
    </div>
    <div class="bg-white shadow rounded-lg overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-3 py-2 text-left font-semibold">Symbol</th>
                    <th class="px-3 py-2 text-right font-semibold">Qty</th>
                    <th class="px-3 py-2 text-right font-semibold">Remaining</th>
                    <th class="px-3 py-2 text-right font-semibold">Cost Basis</th>
                    <th class="px-3 py-2 text-right font-semibold">Total Cost</th>
                    <th class="px-3 py-2 text-right font-semibold">Current Price</th>
                    <th class="px-3 py-2 text-right font-semibold">Market Value</th>
                    <th class="px-3 py-2 text-right font-semibold">Unreal. P/L</th>
                    <th class="px-3 py-2 text-right font-semibold">Unreal. P/L %</th>
                    <th class="px-3 py-2 text-left font-semibold">Acquired</th>
                    <th class="px-3 py-2 text-left font-semibold">Source</th>
                    <th class="px-3 py-2 text-center font-semibold">Actions</th>
                </tr>
            </thead>
            <tbody id="lots-body" class="divide-y divide-gray-100">
            </tbody>
        </table>
        <p id="lots-empty-msg" class="text-center text-gray-400 py-6 hidden">No share lots yet.</p>
    </div>
</div>
