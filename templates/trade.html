<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade #{{ trade_id }} — Wheel Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/" class="text-gray-400 hover:text-gray-600">&larr; Back</a>
                <h1 id="td-header" class="text-xl font-bold tracking-tight">Trade #{{ trade_id }}</h1>
            </div>
            <div id="vix-banner" class="text-sm"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6 space-y-6">

        <!-- AI Recommendation -->
        <section id="recommendation-section">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">Recommendations</h3>
            <div id="rec-alert" class="mb-2"></div>
            <div id="td-recommendation" class="bg-white border rounded-lg p-4">
                <button onclick="fetchRecommendation()"
                    class="w-full py-3 text-sm text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50 rounded-lg transition-colors font-medium">
                    Ask Your Therapist →
                </button>
            </div>
        </section>

        <!-- At a Glance -->
        <section>
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">At a Glance</h3>
            <div id="td-glance" class="bg-white border rounded-lg p-4">
                <p class="text-gray-400 text-sm">Loading…</p>
            </div>
        </section>

        <!-- Risk Assessment -->
        <section>
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">Risk Assessment</h3>
            <div id="td-risk" class="bg-white border rounded-lg p-4">
                <p class="text-gray-400 text-sm">Loading…</p>
            </div>
        </section>

        <!-- Market Context -->
        <section>
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">Market Context</h3>
            <div id="td-market" class="bg-white border rounded-lg p-4">
                <p class="text-gray-400 text-sm">Loading…</p>
            </div>
        </section>

        <!-- Events Timeline -->
        <section>
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">Events</h3>
            <div id="td-events" class="bg-white border rounded-lg p-4">
                <p class="text-gray-400 text-sm">Loading…</p>
            </div>
        </section>

    </main>

    <script src="/static/js/vix.js"></script>
    <script src="/static/js/trade_detail.js"></script>
</body>

</html>
