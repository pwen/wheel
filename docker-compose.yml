services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wheel
      POSTGRES_PASSWORD: wheel
      POSTGRES_DB: wheel
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wheel"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: postgresql://wheel:wheel@db:5432/wheel
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
    volumes:
      - .:/app
      - /app/.venv
    command: ["/app/.venv/bin/python", "-m", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "5002", "--reload"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
